services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pliny_demo
      POSTGRES_USER: pliny
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - demo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pliny -d pliny_demo"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DEMO_MODE: "true"
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: pliny_demo
      DB_USER: pliny
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      CLIENT_URL: ${DEMO_URL:-http://localhost:8090}
      SERVER_URL: ${DEMO_URL:-http://localhost:8090}
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "${DEMO_PORT:-8090}:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  demo_pgdata:
