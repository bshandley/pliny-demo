name: Build Demo Images

on:
  push:
    branches: [main]
  schedule:
    # Nightly at 2am UTC to pick up new pliny releases
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Clone pliny source
        run: git clone --depth 1 https://github.com/bshandley/pliny /tmp/pliny-src

      - name: Symlink pliny source into build context
        run: ln -s /tmp/pliny-src pliny-src

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build server image
        run: docker build -f Dockerfile.server -t ghcr.io/bshandley/pliny-demo-server:latest .

      - name: Build client image
        run: docker build -f Dockerfile.client -t ghcr.io/bshandley/pliny-demo-client:latest .

      - name: Push images
        run: |
          docker push ghcr.io/bshandley/pliny-demo-server:latest
          docker push ghcr.io/bshandley/pliny-demo-client:latest
